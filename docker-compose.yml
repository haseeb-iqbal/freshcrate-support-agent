# Local Postgres with pgvector preinstalled. Mirrors the Supabase extension set,
# so the same DATABASE_URL-driven schema/seed runs locally or against Supabase.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: freshcrate-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freshcrate
    ports:
      - "5432:5432"
    volumes:
      - freshcrate-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freshcrate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  freshcrate-pgdata:
